    if(currentUser){l.classList.add('hidden');lo.classList.remove('hidden');ui.classList.remove('hidden');ui.innerText=`${t('welcome')}: ${currentUser.username}`;}
    else{l.classList.remove('hidden');lo.classList.add('hidden');ui.classList.add('hidden');}
    renderAdminTabs();renderLocalList();
}
document.getElementById('loginBtn').onclick=()=>{
    const u=prompt('Username','admin'),p=prompt('Password','admin123');
    const tu=users.find(x=>x.username===u&&x.password===p);
    if(tu){currentUser=tu;localStorage.setItem('currentUser',JSON.stringify(tu));renderUser();showToast(t('login_success'));}
    else showToast('账号密码错误');
};
document.getElementById('logoutBtn').onclick=()=>{currentUser=null;localStorage.removeItem('currentUser');renderUser();showToast(t('logout_success'));switchView('home');};

// ====================== 6. 视图切换系统（新增EPC视图） ======================
function switchView(v){document.querySelectorAll('.view,.hidden-view').forEach(e=>{e.classList.remove('view');e.classList.add('hidden-view');});document.getElementById(v+'View').classList.add('view');}
document.querySelectorAll('.nav-link').forEach(l=>l.onclick=()=>{const v=l.dataset.nav;if(v==='admin'&&!currentUser){showToast(t('login'));return;}switchView(v);});

// ====================== 7. 产品管理系统（完全保留原有，与EPC打通） ======================
function renderProducts(){
    const g=document.getElementById('productGrid');
    g.innerHTML=products.length?products.map((p,i)=>`
    <div class="bg-white rounded shadow p-4 hover:shadow-lg transition">
        <img src="${p.image}" class="w-full h-40 object-cover rounded mb-2">
        <h3 class="font-bold">${p[`name_${currentLang}`]||p.name}</h3>
        <p class="text-sm text-gray-500">OEM: ${p.oem}</p>
        <p class="text-blue-600 font-bold mt-1">$${p.price}</p>
    </div>`).join(''):'<div class="col-span-4 text-center py-6 text-gray-500">暂无产品</div>';
}
function renderAdminProducts(){
    const p=document.getElementById('adminProductsPanel');
    p.innerHTML=`<button onclick="addProduct()" class="mb-3 px-3 py-1 bg-blue-600 text-white rounded">${t('upload_img')}</button>
    <table class="w-full border text-sm"><thead><tr class="bg-gray-100"><td class="p-2">图片</td><td class="p-2">${t('product_name')}</td><td class="p-2">${t('oem_code')}</td><td class="p-2">操作</td></tr></thead>
    <tbody>${products.map((it,i)=>`<tr>
    <td class="p-2"><img src="${it.image}" class="w-10 h-10 object-cover"></td>
    <td class="p-2">${it.name}</td><td class="p-2">${it.oem}</td>
    <td class="p-2"><button onclick="delProduct(${i})" class="text-red-600">${t('delete')}</button></td>
    </tr>`).join('')}</tbody></table>`;
}
function addProduct(){
    const m=`<div class="modal-overlay"><div class="modal-container">
    <h3 class="font-bold text-lg mb-3">${t('product_name')}</h3>
    <input type="file" id="imgUpload" accept="image/*" class="mb-2">
    <input id="pName" class="w-full p-2 border rounded mb-2" placeholder="${t('product_name')}">
    <input id="pOem" class="w-full p-2 border rounded mb-2" placeholder="${t('oem_code')}">
    <button onclick="saveProduct()" class="w-full bg-blue-600 text-white p-2 rounded">${t('save')}</button>
    </div></div>`;document.body.insertAdjacentHTML('beforeend',m);
}
function saveProduct(){
    const f=document.getElementById('imgUpload').files[0],n=document.getElementById('pName').value,o=document.getElementById('pOem').value;
    if(!f||!n||!o)return showToast('请填写完整');
    const r=new FileReader();r.onload=e=>{products.push({id:Date.now(),name:n,oem:o,image:e.target.result});localStorage.setItem('products',JSON.stringify(products));renderProducts();renderAdminProducts();document.querySelector('.modal-overlay').remove();showToast(t('save'));};r.readAsDataURL(f);
}
function delProduct(i){products.splice(i,1);localStorage.setItem('products',JSON.stringify(products));renderProducts();renderAdminProducts();showToast(t('delete'));}

// ====================== 8. 同城服务系统（完全保留原有） ======================
document.getElementById('publishLocal').onclick=()=>{
    if(!currentUser)return showToast(t('login'));
    const t1=document.getElementById('localTitle').value,c=document.getElementById('localContent').value;
    if(!t1||!c)return showToast('请填写完整');
    localPosts.push({id:Date.now(),title:t1,content:c,user:currentUser.username,status:'pending'});
    localStorage.setItem('localPosts',JSON.stringify(localPosts));
    document.getElementById('localTitle').value='';document.getElementById('localContent').value='';
    showToast(t('publish_success'));renderLocalList();
};
function renderLocalList(){
    const l=document.getElementById('localList');
    l.innerHTML=localPosts.filter(x=>x.status==='approved').map(p=>`
    <div class="bg-white p-4 rounded shadow"><h3 class="font-bold">${p.title}</h3><p class="text-sm">${p.content}</p><p class="text-xs text-gray-500">${p.user}</p></div>`).join('')||'<div class="text-center text-gray-500">暂无服务帖</div>';
}
function renderAdminLocal(){
    const p=document.getElementById('adminLocalPanel');
    p.innerHTML=`<table class="w-full border text-sm"><thead><tr class="bg-gray-100"><td class="p-2">标题</td><td class="p-2">用户</td><td class="p-2">状态</td><td class="p-2">${t('audit')}</td></tr></thead>
    <tbody>${localPosts.map(it=>`<tr>
    <td class="p-2">${it.title}</td><td class="p-2">${it.user}</td><td class="p-2">${t(it.status)}</td>
    <td class="p-2"><button onclick="auditLocal(${it.id})" class="text-green-600">${t('pass')}</button></td>
    </tr>`).join('')}</tbody></table>`;
}
function auditLocal(id){const i=localPosts.findIndex(x=>x.id===id);if(i>-1){localPosts[i].status='approved';localStorage.setItem('localPosts',JSON.stringify(localPosts));renderAdminLocal();renderLocalList();showToast(t('approved'));}}

// ====================== 9. 后台管理系统（完全保留原有） ======================
function renderAdminTabs(){
    const ts=document.querySelectorAll('.admin-tab');ts.forEach(t=>t.classList.add('hidden'));
    ts.forEach(t=>{if(hasPerm(t.dataset.adminTab))t.classList.remove('hidden');});
    ts.forEach(t=>t.onclick=()=>{if(!hasPerm(t.dataset.adminTab))return showToast(t('no_permission'));
        ts.forEach(x=>x.classList.remove('active-tab'));t.classList.add('active-tab');
        document.querySelectorAll('[id^="admin"][Panel]').forEach(p=>p.classList.add('hidden'));
        const pan=document.getElementById(`admin${t.dataset.adminTab.charAt(0).toUpperCase()+t.dataset.adminTab.slice(1)}Panel`);
        pan.classList.remove('hidden');if(t.dataset.adminTab==='products')renderAdminProducts();if(t.dataset.adminTab==='local')renderAdminLocal();
    });
    document.getElementById('adminRole').innerText=`${t('welcome')}: ${currentUser?.username||'Guest'} | ${currentUser?.role||'Guest'}`;
}

document.getElementById('closeChat').onclick=()=>document.getElementById('chatBox').classList.add('hidden');

};

// ====================== 12. EPC电子目录核心逻辑（1:1复刻TMCEPCW3） ======================
// 车型选择四级联动
document.getElementById('epcBrand').addEventListener('change', function() {
    const brand = this.value;
    const modelSelect = document.getElementById('epcModel');
    const yearSelect = document.getElementById('epcYear');
    const systemSelect = document.getElementById('epcSystem');
    
    // 重置下级选择框
    modelSelect.innerHTML = '<option value="">' + t('select_model') + '</option>';
    yearSelect.innerHTML = '<option value="">' + t('select_year') + '</option>';
    systemSelect.innerHTML = '<option value="">' + t('select_system') + '</option>';
    yearSelect.disabled = true;
    systemSelect.disabled = true;
    
    if (brand) {
        // 加载对应品牌的车型
        epcVehicleData[brand].models.forEach(model => {
            const option = document.createElement('option');
            option.value = model;
            option.textContent = model;
            modelSelect.appendChild(option);
        });
        modelSelect.disabled = false;
    } else {
        modelSelect.disabled = true;
        clearEpcView();
    }
});

document.getElementById('epcModel').addEventListener('change', function() {
    const brand = document.getElementById('epcBrand').value;
    const model = this.value;
    const yearSelect = document.getElementById('epcYear');
    const systemSelect = document.getElementById('epcSystem');
    
    yearSelect.innerHTML = '<option value="">' + t('select_year') + '</option>';
    systemSelect.innerHTML = '<option value="">' + t('select_system') + '</option>';
    systemSelect.disabled = true;
    
    if (model) {
        // 加载对应车型的年份
        epcVehicleData[brand].years[model].forEach(year => {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            yearSelect.appendChild(option);
        });
        yearSelect.disabled = false;
    } else {
        yearSelect.disabled = true;
        clearEpcView();
    }
});

document.getElementById('epcYear').addEventListener('change', function() {
    const brand = document.getElementById('epcBrand').value;
    const systemSelect = document.getElementById('epcSystem');
    
    systemSelect.innerHTML = '<option value="">' + t('select_system') + '</option>';
    
    if (this.value) {
        // 加载对应品牌的系统
        epcVehicleData[brand].systems.forEach(system => {
            const option = document.createElement('option');
            option.value = system.split(' ')[0];
            option.textContent = system;
            systemSelect.appendChild(option);
        });
        systemSelect.disabled = false;
    } else {
        systemSelect.disabled = true;
        clearEpcView();
    }
});

document.getElementById('epcSystem').addEventListener('change', function() {
    if (this.value) {
        loadEpcData();
    } else {
        clearEpcView();
    }
});

// 加载EPC数据（爆炸图+配件列表+热点）
function loadEpcData() {
    const brand = document.getElementById('epcBrand').value;
    const model = document.getElementById('epcModel').value;
    const year = document.getElementById('epcYear').value;
    const system = document.getElementById('epcSystem').value;
    const key = `${brand}-${model}-${year}-${system}`;
    
    // 显示加载状态
    document.getElementById('epcImagePlaceholder').innerHTML = `<i class="fas fa-spinner fa-spin text-4xl mb-4"></i><p>${t('loading')}</p>`;
    
    // 筛选匹配的配件
    const matchedParts = products.filter(p => 
        p.brand === brand && 
        p.model === model && 
        p.year === year && 
        p.system === system
    );
    
    // 加载爆炸图（你可以替换成自己TMCEPCW3的真实图片）
    setTimeout(() => {
        document.getElementById('epcImagePlaceholder').classList.add('hidden');
        const explodedView = document.getElementById('epcExplodedView');
        explodedView.src = `https://picsum.photos/seed/${key}/800/600`; // 替换成你的真实图片URL
        explodedView.classList.remove('hidden');
        
        // 渲染配件列表
        renderEpcPartsList(matchedParts);
        
        // 生成热点
        generateEpcHotspots(key, matchedParts);
    }, 300);
}

// 渲染配件列表
function renderEpcPartsList(parts) {
    const list = document.getElementById('epcPartsList');
    if (parts.length === 0) {
        list.innerHTML = `<div class="text-center text-gray-500 py-10">${t('no_parts_yet')}</div>`;
        return;
    }
    
    list.innerHTML = parts.map(p => `
    <div class="epc-part-item p-3 border rounded cursor-pointer" data-part-id="${p.id}" data-hotspot-id="${p.hotspotId}">
        <div class="flex justify-between items-center">
            <div>
                <span class="font-bold mr-2">${p.hotspotId}.</span>
                <span>${p[`name_${currentLang}`]||p.name}</span>
                <p class="text-sm text-gray-500 mt-1">OEM: ${p.oem}</p>
            </div>
            <div class="text-right">
                <p class="text-blue-600 font-bold">$${p.price}</p>
                <button class="text-sm bg-blue-100 text-blue-600 px-2 py-1 rounded mt-1" onclick="addPartToInquiry(${p.id})">${t('add_to_inquiry')}</button>
            </div>
        </div>
    </div>
    `).join('');
    
    // 绑定配件点击事件（点击配件高亮对应热点）
    document.querySelectorAll('.epc-part-item').forEach(item => {
        item.addEventListener('click', function() {
            const hotspotId = this.dataset.hotspotId;
            // 高亮配件项
            document.querySelectorAll('.epc-part-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            // 高亮对应热点
            document.querySelectorAll('.epc-hotspot').forEach(h => h.classList.remove('active'));
            document.querySelector(`.epc-hotspot[data-hotspot-id="${hotspotId}"]`)?.classList.add('active');
        });
    });
}

// 生成图片热点（和TMCEPCW3完全一致的交互）
function generateEpcHotspots(key, parts) {
    // 清除旧热点
    document.querySelectorAll('.epc-hotspot').forEach(h => h.remove());
    
    const container = document.getElementById('epcImageContainer');
    const positions = epcHotspotPositions[key] || [];
    
    positions.forEach(pos => {
        const part = parts.find(p => p.hotspotId === pos.id);
        if (part) {
            const hotspot = document.createElement('div');
            hotspot.className = 'epc-hotspot';
            hotspot.dataset.hotspotId = pos.id;
            hotspot.textContent = pos.id;
            hotspot.style.top = pos.top;
            hotspot.style.left = pos.left;
            
            // 点击热点高亮对应配件（TMCEPCW3核心交互）
            hotspot.addEventListener('click', function() {
                document.querySelectorAll('.epc-hotspot').forEach(h => h.classList.remove('active'));
                this.classList.add('active');
                // 高亮右侧配件并自动滚动
                const partItem = document.querySelector(`.epc-part-item[data-hotspot-id="${pos.id}"]`);
                if (partItem) {
                    document.querySelectorAll('.epc-part-item').forEach(i => i.classList.remove('active'));
                    partItem.classList.add('active');
                    partItem.scrollIntoView({behavior: 'smooth', block: 'center'});
                }
            });
            
            container.appendChild(hotspot);
        }
    });
}

// 清空EPC视图
function clearEpcView() {
    document.getElementById('epcImagePlaceholder').classList.remove('hidden');
    document.getElementById('epcImagePlaceholder').innerHTML = `<i class="fas fa-car-side text-6xl mb-4 text-gray-300"></i><p>${t('select_vehicle_first')}</p>`;
    document.getElementById('epcExplodedView').classList.add('hidden');
    document.getElementById('epcPartsList').innerHTML = `<div class="text-center text-gray-500 py-10">${t('no_parts_yet')}</div>`;
    document.querySelectorAll('.epc-hotspot').forEach(h => h.remove());
}

// 加入询价单
function addPartToInquiry(partId) {
    const part = products.find(p => p.id === partId);
    if (part) {
        inquiryCart.push(part);
        showToast(t('part_added'));
    }
}

// 全部加入询价单
document.getElementById('addAllToInquiry').addEventListener('click', function() {
    const brand = document.getElementById('epcBrand').value;
    const model = document.getElementById('epcModel').value;
    const year = document.getElementById('epcYear').value;
    const system = document.getElementById('epcSystem').value;
    
    const matchedParts = products.filter(p => 
        p.brand === brand && 
        p.model === model && 
        p.year === year && 
        p.system === system
    );
    
    matchedParts.forEach(p => inquiryCart.push(p));
    showToast(`已添加 ${matchedParts.length} 个配件到询价单`);
});

window.onload=()=>{updateLang();renderUser();renderProducts();renderLocalList();};
</script>
