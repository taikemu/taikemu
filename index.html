<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoParts Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view { display: block; }
        .hidden-view { display: none; }
        .active-tab { background: #2563eb; color: white; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-container { background: white; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .nav-active { color: #2563eb; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
<!-- 顶部导航 -->
<header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fas fa-car text-blue-600 text-2xl"></i>
            <h1 class="text-xl font-bold" data-i18n="brand">AutoParts Hub</h1>
        </div>
        <nav class="hidden md:flex gap-5">
            <a data-nav="home" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="home">首页</a>
            <a data-nav="products" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="products">产品</a>
            <a data-nav="local" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="local">同城</a>
            <a data-nav="inquiry" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="inquiry">询价</a>
            <a data-nav="admin" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="admin">管理后台</a>
        </nav>
        <div class="flex items-center gap-3">
            <button class="lang-switch px-2 py-1 text-sm border rounded" data-lang="zh">中</button>
            <button class="lang-switch px-2 py-1 text-sm border rounded" data-lang="en">EN</button>
            <button class="lang-switch px-2 py-1 text-sm border rounded" data-lang="fr">FR</button>
            <button id="loginBtn" class="px-3 py-1 bg-blue-600 text-white rounded" data-i18n="login">登录</button>
            <button id="logoutBtn" class="px-3 py-1 bg-gray-600 text-white rounded hidden" data-i18n="logout">注销</button>
            <span id="userInfo" class="hidden text-sm font-medium"></span>
        </div>
    </div>
</header>

<main class="flex-1 max-w-7xl mx-auto px-4 py-6 w-full">
    <!-- 首页 -->
    <div id="homeView" class="view">
        <div class="bg-blue-50 rounded-xl p-8 text-center">
            <h2 class="text-2xl font-bold mb-4" data-i18n="search_title">汽配智能搜索</h2>
            <div class="max-w-2xl mx-auto flex gap-2">
                <input id="searchInput" class="flex-1 p-3 border rounded-lg" placeholder="OEM/VIN" data-i18n="search_placeholder">
                <button id="searchBtn" class="bg-blue-600 text-white px-4 rounded-lg" data-i18n="search">搜索</button>
            </div>
        </div>
    </div>

    <!-- 产品 -->
    <div id="productsView" class="hidden-view">
        <h2 class="text-xl font-bold mb-4" data-i18n="products">产品列表</h2>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>

    <!-- 同城 -->
    <div id="localView" class="hidden-view">
        <h2 class="text-xl font-bold mb-4" data-i18n="local">同城服务</h2>
        <div class="bg-white p-4 rounded shadow mb-4">
            <input id="localTitle" class="w-full p-2 border rounded mb-2" placeholder="标题" data-i18n="title">
            <textarea id="localContent" class="w-full p-2 border rounded h-20 mb-2" placeholder="内容" data-i18n="content"></textarea>
            <button id="publishLocal" class="bg-blue-600 text-white px-4 py-2 rounded" data-i18n="publish">发布</button>
        </div>
        <div id="localList" class="space-y-3"></div>
    </div>

    <!-- 询价 -->
    <div id="inquiryView" class="hidden-view">
        <h2 class="text-xl font-bold mb-4" data-i18n="inquiry">在线询价</h2>
        <form class="max-w-xl bg-white p-6 rounded-xl shadow space-y-4">
            <input class="w-full p-2 border rounded" placeholder="姓名" data-i18n="name" required>
            <input class="w-full p-2 border rounded" placeholder="电话" data-i18n="phone" required>
            <input class="w-full p-2 border rounded" placeholder="邮箱" data-i18n="email" required>
            <textarea class="w-full p-2 border rounded h-24" placeholder="询价内容" data-i18n="content" required></textarea>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded" data-i18n="submit">提交</button>
        </form>
    </div>

    <!-- 管理后台 -->
    <div id="adminView" class="hidden-view">
        <div class="bg-white p-4 rounded-lg shadow mb-4">
            <h3 class="text-lg font-bold" data-i18n="admin_panel">管理后台</h3>
            <p id="adminRole" class="text-sm text-gray-600 mt-1"></p>
        </div>
        <div class="flex gap-2 mb-4 flex-wrap" id="adminTabs">
            <button class="admin-tab px-4 py-2 rounded border" data-admin-tab="products" data-i18n="product_mgt">产品管理</button>
            <button class="admin-tab px-4 py-2 rounded border" data-admin-tab="local" data-i18n="local_mgt">同城审核</button>
            <button class="admin-tab px-4 py-2 rounded border" data-admin-tab="users" data-i18n="user_mgt">用户管理</button>
        </div>
        <div id="adminProductsPanel" class="hidden bg-white p-4 rounded-xl shadow"></div>
        <div id="adminLocalPanel" class="hidden bg-white p-4 rounded-xl shadow"></div>
        <div id="adminUsersPanel" class="hidden bg-white p-4 rounded-xl shadow"></div>
    </div>
</main>

<!-- 底部 -->
<footer class="bg-gray-800 text-white py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <div class="font-bold text-lg">AutoParts Hub</div>
                <p class="text-sm text-gray-400" data-i18n="footer_desc">专业汽配跨境平台</p>
            </div>
            <div class="flex gap-5 text-xl">
                <a href="#" class="hover:text-blue-400"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-blue-400"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="hover:text-blue-400"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover:text-blue-400"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
        <div class="border-t border-gray-700 mt-4 pt-4 text-center text-sm text-gray-400">© 2025 All Rights Reserved</div>
    </div>
</footer>

<!-- 聊天窗口 -->
<div class="fixed bottom-6 right-6 z-50">
    <button id="openChat" class="w-14 h-14 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-lg text-2xl">
        <i class="fas fa-comments"></i>
    </button>
    <div id="chatBox" class="hidden w-80 bg-white rounded-xl shadow-2xl overflow-hidden fixed bottom-20 right-6">
        <div class="bg-blue-600 text-white p-3 flex justify-between items-center">
            <span data-i18n="chat">在线客服</span>
            <button id="closeChat"><i class="fas fa-times"></i></button>
        </div>
        <div class="h-64 p-3 bg-gray-50 overflow-y-auto" id="chatMessages"></div>
        <div class="flex p-2 border-t">
            <input id="chatInput" class="flex-1 p-2 border rounded-l" placeholder="消息" data-i18n="message">
            <button id="sendChat" class="bg-blue-600 text-white px-3 rounded-r" data-i18n="send">发送</button>
        </div>
    </div>
</div>

<!-- 提示框 -->
<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-black/80 text-white px-4 py-2 rounded z-50 hidden">
    <span id="toastText"></span>
</div>

<script>
// 1. 三语翻译库
const translations = {
    zh: {brand:"AutoParts Hub",home:"首页",products:"产品",local:"同城",inquiry:"询价",admin:"管理后台",
    login:"登录",logout:"注销",search_title:"汽配智能搜索",search_placeholder:"输入OEM/VIN",search:"搜索",
    name:"姓名",phone:"电话",email:"邮箱",content:"内容",title:"标题",publish:"发布",submit:"提交",
    chat:"在线客服",message:"消息",send:"发送",footer_desc:"专业汽配跨境平台",
    admin_panel:"管理后台",product_mgt:"产品管理",local_mgt:"同城审核",user_mgt:"用户管理",
    welcome:"欢迎",no_permission:"无权限",login_success:"登录成功",logout_success:"注销成功",
    pending:"待审核",approved:"已审核",publish_success:"发布成功，等待管理员审核",
    product_img:"产品图片",product_name:"产品名称",oem_code:"OEM编号",save:"保存",edit:"编辑",delete:"删除",
    upload_img:"上传图片",audit:"审核",pass:"通过"},
    en: {brand:"AutoParts Hub",home:"Home",products:"Products",local:"Local",inquiry:"Inquiry",admin:"Admin",
    login:"Login",logout:"Logout",search_title:"Auto Parts Search",search_placeholder:"OEM/VIN",search:"Search",
    name:"Name",phone:"Phone",email:"Email",content:"Content",title:"Title",publish:"Publish",submit:"Submit",
    chat:"Support",message:"Message",send:"Send",footer_desc:"Professional Auto Parts Platform",
    admin_panel:"Admin Panel",product_mgt:"Products",local_mgt:"Local Audit",user_mgt:"Users",
    welcome:"Welcome",no_permission:"No Permission",login_success:"Login Success",logout_success:"Logout Success",
    pending:"Pending",approved:"Approved",publish_success:"Published, waiting for audit",
    product_img:"Image",product_name:"Name",oem_code:"OEM",save:"Save",edit:"Edit",delete:"Delete",
    upload_img:"Upload",audit:"Audit",pass:"Pass"},
    fr: {brand:"AutoParts Hub",home:"Accueil",products:"Produits",local:"Local",inquiry:"Demande",admin:"Admin",
    login:"Connexion",logout:"Déconnexion",search_title:"Recherche Pièces",search_placeholder:"OEM/VIN",search:"Rechercher",
    name:"Nom",phone:"Téléphone",email:"Email",content:"Contenu",title:"Titre",publish:"Publier",submit:"Envoyer",
    chat:"Support",message:"Message",send:"Envoyer",footer_desc:"Plateforme Auto Parts",
    admin_panel:"Panneau Admin",product_mgt:"Produits",local_mgt:"Vérification",user_mgt:"Utilisateurs",
    welcome:"Bienvenue",no_permission:"Pas de permission",login_success:"Connexion OK",logout_success:"Déconnexion OK",
    pending:"En attente",approved:"Approuvé",publish_success:"Publié, en attente de vérification",
    product_img:"Image",product_name:"Nom",oem_code:"OEM",save:"Enregistrer",edit:"Modifier",delete:"Supprimer",
    upload_img:"Télécharger",audit:"Vérifier",pass:"Approuver"}
};
let currentLang = localStorage.getItem('lang') || 'zh';
function t(k){return translations[currentLang][k]||k;}
function updateLang(){document.querySelectorAll('[data-i18n]').forEach(e=>e.innerText=t(e.dataset.i18n));localStorage.setItem('lang',currentLang);}

// 2. 用户权限系统
const users = [
    {id:1,username:'admin',password:'admin123',role:'super',perms:['products','local','users']},
    {id:2,username:'editor',password:'editor123',role:'editor',perms:['products']},
    {id:3,username:'user',password:'123456',role:'user',perms:[]}
];
let currentUser = JSON.parse(localStorage.getItem('currentUser'))||null;
function hasPerm(p){if(!currentUser)return false;if(currentUser.role==='super')return true;return currentUser.perms.includes(p);}

// 3. 数据存储
let products = JSON.parse(localStorage.getItem('products'))||[];
let localPosts = JSON.parse(localStorage.getItem('localPosts'))||[];

// 4. 提示框
function showToast(m){document.getElementById('toastText').innerText=m;document.getElementById('toast').classList.remove('hidden');setTimeout(()=>document.getElementById('toast').classList.add('hidden'),2500);}

// 5. 登录注销
function renderUser(){
    const l=document.getElementById('loginBtn'),lo=document.getElementById('logoutBtn'),ui=document.getElementById('userInfo');
    if(currentUser){l.classList.add('hidden');lo.classList.remove('hidden');ui.classList.remove('hidden');ui.innerText=`${t('welcome')}: ${currentUser.username}`;}
    else{l.classList.remove('hidden');lo.classList.add('hidden');ui.classList.add('hidden');}
    renderAdminTabs();renderLocalList();
}
document.getElementById('loginBtn').onclick=()=>{
    const u=prompt('Username','admin'),p=prompt('Password','admin123');
    const tu=users.find(x=>x.username===u&&x.password===p);
    if(tu){currentUser=tu;localStorage.setItem('currentUser',JSON.stringify(tu));renderUser();showToast(t('login_success'));}
    else showToast('Error');
};
document.getElementById('logoutBtn').onclick=()=>{currentUser=null;localStorage.removeItem('currentUser');renderUser();showToast(t('logout_success'));switchView('home');};

// 6. 视图切换
function switchView(v){document.querySelectorAll('.view,.hidden-view').forEach(e=>{e.classList.remove('view');e.classList.add('hidden-view');});document.getElementById(v+'View').classList.add('view');}
document.querySelectorAll('.nav-link').forEach(l=>l.onclick=()=>{const v=l.dataset.nav;if(v==='admin'&&!currentUser){showToast(t('login'));return;}switchView(v);});

// 7. 产品管理
function renderProducts(){
    const g=document.getElementById('productGrid');
    g.innerHTML=products.length?products.map((p,i)=>`
    <div class="bg-white rounded shadow p-4">
        <img src="${p.img}" class="w-full h-40 object-cover rounded mb-2">
        <h3 class="font-bold">${p.name}</h3>
        <p class="text-sm text-gray-500">OEM: ${p.oem}</p>
    </div>`).join(''):'<div class="col-span-4 text-center py-6 text-gray-500">No Products</div>';
}
function renderAdminProducts(){
    const p=document.getElementById('adminProductsPanel');
    p.innerHTML=`<button onclick="addProduct()" class="mb-3 px-3 py-1 bg-blue-600 text-white rounded">${t('upload_img')}</button>
    <table class="w-full border text-sm"><thead><tr class="bg-gray-100"><td class="p-2">Img</td><td class="p-2">${t('product_name')}</td><td class="p-2">${t('oem_code')}</td><td class="p-2">${t('action')}</td></tr></thead>
    <tbody>${products.map((it,i)=>`<tr>
    <td class="p-2"><img src="${it.img}" class="w-10 h-10 object-cover"></td>
    <td class="p-2">${it.name}</td><td class="p-2">${it.oem}</td>
    <td class="p-2"><button onclick="delProduct(${i})" class="text-red-600">${t('delete')}</button></td>
    </tr>`).join('')}</tbody></table>`;
}
function addProduct(){
    const m=`<div class="modal-overlay"><div class="modal-container">
    <h3 class="font-bold text-lg mb-3">${t('product_name')}</h3>
    <input type="file" id="imgUpload" accept="image/*" class="mb-2">
    <input id="pName" class="w-full p-2 border rounded mb-2" placeholder="${t('product_name')}">
    <input id="pOem" class="w-full p-2 border rounded mb-2" placeholder="${t('oem_code')}">
    <button onclick="saveProduct()" class="w-full bg-blue-600 text-white p-2 rounded">${t('save')}</button>
    </div></div>`;document.body.insertAdjacentHTML('beforeend',m);
}
function saveProduct(){
    const f=document.getElementById('imgUpload').files[0],n=document.getElementById('pName').value,o=document.getElementById('pOem').value;
    if(!f||!n||!o)return showToast(t('no_permission'));
    const r=new FileReader();r.onload=e=>{products.push({img:e.target.result,name:n,oem:o});localStorage.setItem('products',JSON.stringify(products));renderProducts();renderAdminProducts();document.querySelector('.modal-overlay').remove();showToast(t('save'));};r.readAsDataURL(f);
}
function delProduct(i){products.splice(i,1);localStorage.setItem('products',JSON.stringify(products));renderProducts();renderAdminProducts();showToast(t('delete'));}

// 8. 同城发布+审核
document.getElementById('publishLocal').onclick=()=>{
    if(!currentUser)return showToast(t('login'));
    const t1=document.getElementById('localTitle').value,c=document.getElementById('localContent').value;
    if(!t1||!c)return showToast(t('no_permission'));
    localPosts.push({id:Date.now(),title:t1,content:c,user:currentUser.username,status:'pending'});
    localStorage.setItem('localPosts',JSON.stringify(localPosts));
    document.getElementById('localTitle').value='';document.getElementById('localContent').value='';
    showToast(t('publish_success'));renderLocalList();
};
function renderLocalList(){
    const l=document.getElementById('localList');
    l.innerHTML=localPosts.filter(x=>x.status==='approved').map(p=>`
    <div class="bg-white p-4 rounded shadow"><h3 class="font-bold">${p.title}</h3><p class="text-sm">${p.content}</p><p class="text-xs text-gray-500">${p.user}</p></div>`).join('')||'<div class="text-center text-gray-500">No Posts</div>';
}
function renderAdminLocal(){
    const p=document.getElementById('adminLocalPanel');
    p.innerHTML=`<table class="w-full border text-sm"><thead><tr class="bg-gray-100"><td class="p-2">Title</td><td class="p-2">User</td><td class="p-2">Status</td><td class="p-2">${t('audit')}</td></tr></thead>
    <tbody>${localPosts.map(it=>`<tr>
    <td class="p-2">${it.title}</td><td class="p-2">${it.user}</td><td class="p-2">${t(it.status)}</td>
    <td class="p-2"><button onclick="auditLocal(${it.id})" class="text-green-600">${t('pass')}</button></td>
    </tr>`).join('')}</tbody></table>`;
}
function auditLocal(id){const i=localPosts.findIndex(x=>x.id===id);if(i>-1){localPosts[i].status='approved';localStorage.setItem('localPosts',JSON.stringify(localPosts));renderAdminLocal();renderLocalList();showToast(t('approved'));}}

// 9. 后台TAB
function renderAdminTabs(){
    const ts=document.querySelectorAll('.admin-tab');ts.forEach(t=>t.classList.add('hidden'));
    ts.forEach(t=>{if(hasPerm(t.dataset.adminTab))t.classList.remove('hidden');});
    ts.forEach(t=>t.onclick=()=>{if(!hasPerm(t.dataset.adminTab))return showToast(t('no_permission'));
        ts.forEach(x=>x.classList.remove('active-tab'));t.classList.add('active-tab');
        document.querySelectorAll('[id^="admin"][Panel]').forEach(p=>p.classList.add('hidden'));
        const pan=document.getElementById(`admin${t.dataset.adminTab.charAt(0).toUpperCase()+t.dataset.adminTab.slice(1)}Panel`);
        pan.classList.remove('hidden');if(t.dataset.adminTab==='products')renderAdminProducts();if(t.dataset.adminTab==='local')renderAdminLocal();
    });
    document.getElementById('adminRole').innerText=`${t('welcome')}: ${currentUser?.username||'Guest'} | ${currentUser?.role||'Guest'}`;
}

// 10. 聊天
document.getElementById('openChat').onclick=()=>document.getElementById('chatBox').classList.remove('hidden');
document.getElementById('closeChat').onclick=()=>document.getElementById('chatBox').classList.add('hidden');
document.getElementById('sendChat').onclick=()=>{
    const m=document.getElementById('chatInput').value.trim(),b=document.getElementById('chatMessages');
    if(!m)return;b.innerHTML+=`<div class="flex justify-end mb-2"><div class="bg-blue-600 text-white p-2 rounded">${m}</div></div>`;
    document.getElementById('chatInput').value='';
    setTimeout(()=>{b.innerHTML+=`<div class="flex justify-start mb-2"><div class="gray p-2 rounded">Merci! Nous répondons bientôt.</div></div>`;b.scrollTop=b.scrollHeight;},600);
};

// 11. 语言切换
document.querySelectorAll('.lang-switch').forEach(b=>b.onclick=()=>{currentLang=b.dataset.lang;updateLang();});

// 初始化
window.onload=()=>{updateLang();renderUser();renderProducts();renderLocalList();};
</script>
</body>
</html>
