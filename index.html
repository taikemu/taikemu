<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoParts Hub - 汽配管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view { display: block; }
        .hidden-view { display: none; }
        .active-tab { background: #2563eb; color: white; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal-container { background: white; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .nav-active { color: #2563eb; font-weight: 600; }
        .product-card { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
        .product-image { height: 200px; background-size: cover; background-position: center; }
        .table-responsive { overflow-x: auto; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background-color: #e5e7eb; }
        .status-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.875rem; }
        .status-pending { background-color: #fff3bf; color: #9a670d; }
        .status-approved { background-color: #d1fae5; color: #057a33; }
        .status-rejected { background-color: #ffe4e6; color: #b91c1c; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-car text-blue-600 text-2xl"></i>
                <h1 class="text-xl font-bold" data-i18n="brand">AutoParts Hub</h1>
            </div>
            <nav class="hidden md:flex gap-5 items-center">
                <a data-nav="home" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="home">首页</a>
                <a data-nav="products" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="products">产品</a>
                <a data-nav="local" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="local">同城</a>
                <a data-nav="inquiry" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="inquiry">询价</a>
                <a data-nav="account" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="account">个人中心</a>
                <a data-nav="admin" class="nav-link cursor-pointer hover:text-blue-600" data-i18n="admin">管理后台</a>
            </nav>
            <div class="flex items-center gap-3">
                <div class="flex gap-2">
                    <button class="lang-switch px-2 py-1 text-sm border rounded" data-lang="zh">中</button>
                    <button class="lang-switch px-2 py-1 text-sm border rounded" data-lang="en">EN</button>
                    <button class="lang-switch px-2 py-1 text-sm border rounded" data-lang="fr">FR</button>
                </div>
                <div class="flex items-center gap-2" id="userMenu">
                    <div class="user-avatar" id="userAvatar"></div>
                    <span class="text-sm font-medium" id="userName"></span>
                    <i class="fas fa-chevron-down text-sm"></i>
                    <div class="absolute right-0 mt-10 bg-white shadow-lg rounded-lg py-1 hidden" id="userDropdown">
                        <a href="#" class="block px-4 py-2 text-sm hover:bg-gray-100" onclick="logout()">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="flex-1 max-w-7xl mx-auto px-4 py-6 w-full">
        <!-- 首页视图 -->
        <div id="homeView" class="view">
            <div class="bg-blue-50 rounded-xl p-8 text-center">
                <h2 class="text-2xl font-bold mb-4" data-i18n="search_title">汽配智能搜索</h2>
                <div class="max-w-2xl mx-auto flex gap-2">
                    <input id="searchInput" class="flex-1 p-3 border rounded-lg" placeholder="输入OEM/VIN" data-i18n="search_placeholder">
                    <button id="searchBtn" class="bg-blue-600 text-white px-4 rounded-lg" data-i18n="search">搜索</button>
                </div>
            </div>
        </div>

        <!-- 产品列表视图 -->
        <div id="productsView" class="hidden-view">
            <h2 class="text-xl font-bold mb-4" data-i18n="products">产品列表</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="productGrid"></div>
            <button id="addProductBtn" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded" data-i18n="add_product" style="display: none;">添加产品</button>
        </div>

        <!-- 同城服务视图 -->
        <div id="localView" class="hidden-view">
            <h2 class="text-xl font-bold mb-4" data-i18n="local">同城服务</h2>
            <div class="bg-white p-4 rounded shadow mb-4">
                <input id="localTitle" class="w-full p-2 border rounded mb-2" placeholder="标题" data-i18n="title">
                <textarea id="localContent" class="w-full p-2 border rounded h-20 mb-2" placeholder="内容" data-i18n="content"></textarea>
                <button id="publishLocalBtn" class="bg-blue-600 text-white px-4 py-2 rounded" data-i18n="publish">发布</button>
            </div>
            <div id="localPosts" class="space-y-3"></div>
        </div>

        <!-- 询价视图 -->
        <div id="inquiryView" class="hidden-view">
            <h2 class="text-xl font-bold mb-4" data-i18n="inquiry">在线询价</h2>
            <form id="inquiryForm" class="max-w-xl bg-white p-6 rounded-xl shadow space-y-4">
                <input class="w-full p-2 border rounded" placeholder="姓名" data-i18n="name" required>
                <input class="w-full p-2 border rounded" placeholder="电话" data-i18n="phone" required>
                <input class="w-full p-2 border rounded" placeholder="邮箱" data-i18n="email" required>
                <textarea class="w-full p-2 border rounded h-24" placeholder="询价内容" data-i18n="content" required></textarea>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded" data-i18n="submit">提交</button>
            </form>
        </div>

        <!-- 个人中心视图 -->
        <div id="accountView" class="hidden-view">
            <h2 class="text-xl font-bold mb-4" data-i18n="account">个人中心</h2>
            <div class="bg-white p-4 rounded shadow">
                <div class="flex items-center mb-4">
                    <div class="user-avatar w-48 h-48 mr-4"></div>
                    <div>
                        <p class="text-lg font-bold" id="accountUsername"></p>
                        <p class="text-sm text-gray-500" id="accountRole"></p>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-gray-100 p-4 rounded">
                        <h3 class="text-lg font-bold mb-2" data-i18n="personal_info">个人信息</h3>
                        <p class="mb-1"><span class="font-medium" data-i18n="username">用户名:</span> <span id="accountUsernameValue"></span></p>
                        <p class="mb-1"><span class="font-medium" data-i18n="role">角色:</span> <span id="accountRoleValue"></span></p>
                        <p class="mb-1"><span class="font-medium" data-i18n="register_time">注册时间:</span> <span id="accountRegisterTime"></span></p>
                    </div>
                    <div class="bg-gray-100 p-4 rounded">
                        <h3 class="text-lg font-bold mb-2" data-i18n="change_password">修改密码</h3>
                        <input type="password" id="oldPassword" class="w-full p-2 border rounded mb-2" placeholder="旧密码" data-i18n="old_password">
                        <input type="password" id="newPassword" class="w-full p-2 border rounded mb-2" placeholder="新密码" data-i18n="new_password">
                        <input type="password" id="confirmPassword" class="w-full p-2 border rounded mb-2" placeholder="确认新密码" data-i18n="confirm_password">
                        <button class="w-full bg-blue-600 text-white p-2 rounded" onclick="changePassword()" data-i18n="save_changes">保存修改</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 管理后台视图 -->
        <div id="adminView" class="hidden-view">
            <h2 class="text-xl font-bold mb-4" data-i18n="admin_panel">管理后台</h2>
            <div class="flex gap-2 mb-4 flex-wrap" id="adminTabs">
                <button class="admin-tab px-4 py-2 rounded border" data-admin-tab="products" data-i18n="product_mgt">产品管理</button>
                <button class="admin-tab px-4 py-2 rounded border" data-admin-tab="local" data-i18n="local_mgt">同城审核</button>
                <button class="admin-tab px-4 py-2 rounded border" data-admin-tab="users" data-i18n="user_mgt">用户管理</button>
            </div>
            <div id="adminProductsPanel" class="hidden bg-white p-4 rounded-xl shadow"></div>
            <div id="adminLocalPanel" class="hidden bg-white p-4 rounded-xl shadow"></div>
            <div id="adminUsersPanel" class="hidden bg-white p-4 rounded-xl shadow"></div>
        </div>
    </main>

    <!-- 底部栏 -->
    <footer class="bg-gray-800 text-white py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
                <div class="text-center md:text-left">
                    <div class="font-bold text-lg">AutoParts Hub</div>
                    <p class="text-sm text-gray-400" data-i18n="footer_desc">专业汽配跨境平台</p>
                </div>
                <div class="flex gap-5 text-xl">
                    <a href="#" class="hover:text-blue-400"><i class="fab fa-facebook"></i></a>
                    <a href="#" class="hover:text-blue-400"><i class="fab fa-whatsapp"></i></a>
                    <a href="#" class="hover:text-blue-400"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="hover:text-blue-400"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
            <div class="border-t border-gray-700 mt-4 pt-4 text-center text-sm text-gray-400">© 2025 AutoParts Hub. 版权所有</div>
        </div>
    </footer>

    <!-- 右侧聊天窗口 -->
    <div class="fixed bottom-6 right-6 z-50">
        <button id="openChatBtn" class="w-14 h-14 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-lg text-2xl">
            <i class="fas fa-comments"></i>
        </button>
        <div id="chatBox" class="hidden w-80 bg-white rounded-xl shadow-2xl overflow-hidden fixed bottom-20 right-6">
            <div class="bg-blue-600 text-white p-3 flex justify-between items-center">
                <span data-i18n="chat">在线客服</span>
                <button id="closeChatBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="h-64 p-3 bg-gray-50 overflow-y-auto" id="chatMessages"></div>
            <div class="flex p-2 border-t">
                <input id="chatInput" class="flex-1 p-2 border rounded-l" placeholder="输入消息" data-i18n="message">
                <button id="sendChatBtn" class="bg-blue-600 text-white px-3 rounded-r" data-i18n="send">发送</button>
            </div>
        </div>
    </div>

    <!-- 模态框模板 -->
    <template id="productModalTemplate">
        <div class="modal-overlay" id="productModal">
            <div class="modal-container">
                <h3 class="font-bold text-lg mb-3" id="modalTitle"></h3>
                <input type="file" id="productImage" accept="image/*" class="mb-2">
                <input id="productName" class="w-full p-2 border rounded mb-2" placeholder="产品名称" data-i18n="product_name">
                <input id="productOem" class="w-full p-2 border rounded mb-2" placeholder="OEM编号" data-i18n="oem_code">
                <input type="hidden" id="productId">
                <button id="saveProductBtn" class="w-full bg-blue-600 text-white p-2 rounded" onclick="saveProduct()">保存</button>
                <button id="cancelProductBtn" class="w-full bg-gray-400 text-white p-2 rounded mt-2" onclick="closeModal()">取消</button>
            </div>
        </div>
    </template>

    <template id="userModalTemplate">
        <div class="modal-overlay" id="userModal">
            <div class="modal-container">
                <h3 class="font-bold text-lg mb-3" id="userModalTitle"></h3>
                <input id="userId" type="hidden">
                <input id="userName" class="w-full p-2 border rounded mb-2" placeholder="用户名" data-i18n="username">
                <input id="userPassword" type="password" class="w-full p-2 border rounded mb-2" placeholder="密码" data-i18n="password">
                <select id="userRole" class="w-full p-2 border rounded mb-2" data-i18n="role">
                    <option value="super_admin">超级管理员</option>
                    <option value="editor">编辑</option>
                    <option value="user">普通用户</option>
                </select>
                <button id="saveUserBtn" class="w-full bg-blue-600 text-white p-2 rounded" onclick="saveUser()">保存</button>
                <button id="cancelUserBtn" class="w-full bg-gray-400 text-white p-2 rounded mt-2" onclick="closeUserModal()">取消</button>
            </div>
        </div>
    </template>

    <!-- 提示框 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-black/80 text-white px-4 py-2 rounded z-50 hidden">
        <span id="toastText"></span>
    </div>

        let currentLang = localStorage.getItem('lang') || 'zh';
        function t(key) {
            return translations[currentLang][key] || key;
        }

        // 权限系统
        const users = [
            { id: 1, username: 'admin', password: 'admin123', role: 'super_admin', permissions: ['products', 'local', 'users'] },
            { id: 2, username: 'editor', password: 'editor123', role: 'editor', permissions: ['products'] },
            { id: 3, username: 'user', password: '123456', role: 'user', permissions: [] }
        ];

        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;

        function hasPermission(permission) {
            if (!currentUser) return false;
            if (currentUser.role === 'super_admin') return true;
            return currentUser.permissions.includes(permission);
        }

        // 数据存储
        let products = JSON.parse(localStorage.getItem('products')) || [];
        let localPosts = JSON.parse(localStorage.getItem('localPosts')) || [];

        // 初始化
        function init() {
            updateLanguage();
            renderUserStatus();
            renderProductGrid();
            renderLocalPosts();
            renderAdminTabs();
        }

        // 更新语言
        function updateLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                element.textContent = t(element.dataset.i18n);
            });
            document.documentElement.lang = currentLang;
        }

        // 切换语言
        document.querySelectorAll('.lang-switch').forEach(button => {
            button.addEventListener('click', function() {
                currentLang = this.dataset.lang;
                localStorage.setItem('lang', currentLang);
                updateLanguage();
            });
        });

        // 渲染用户状态
        function renderUserStatus() {
            const userMenu = document.getElementById('userMenu');
            const userName = document.getElementById('userName');
            const userAvatar = document.getElementById('userAvatar');
            const addProductBtn = document.getElementById('addProductBtn');

            if (currentUser) {
                userName.textContent = currentUser.username;
                userMenu.style.display = 'flex';
                addProductBtn.style.display = hasPermission('products') ? 'block' : 'none';
            } else {
                userMenu.style.display = 'none';
                addProductBtn.style.display = 'none';
            }
        }

        // 登录
        function login() {
            const username = prompt(t('username'), 'admin');
            const password = prompt(t('password'), 'admin123');

            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                showToast(t('login_success'));
                renderUserStatus();
                if (hasPermission('products')) {
                    document.getElementById('addProductBtn').style.display = 'block';
                }
            } else {
                showToast(t('wrong_password'));
            }
        }

        // 退出登录
        function logout() {
            currentUser = null;
            localStorage.setItem('currentUser', null);
            showToast(t('logout_success'));
            renderUserStatus();
            switchView('home');
        }

        // 切换视图
        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(view => {
                view.classList.remove('view');
                view.classList.add('hidden-view');
            });
            document.getElementById(`${viewName}View`).classList.remove('hidden-view');
            document.getElementById(`${viewName}View`).classList.add('view');

            if (viewName === 'admin' && !currentUser) {
                showToast(t('unauthorized'));
                switchView('home');
            }
        }

        // 导航切换
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function() {
                const targetView = this.dataset.nav;
                if (targetView === 'admin' && !currentUser) {
                    showToast(t('unauthorized'));
                    return;
                }
                switchView(targetView);
            });
        });

        // 显示提示框
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        // 产品相关功能
        function renderProductGrid() {
            const productGrid = document.getElementById('productGrid');
            productGrid.innerHTML = '';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image" style="background-image: url('${product.image}')"></div>
                    <div class="p-4">
                        <h3 class="font-bold">${product.name}</h3>
                        <p class="text-sm text-gray-500">OEM: ${product.oem}</p>
                        <div class="flex justify-end mt-2">
                            ${hasPermission('products') ? `
                                <button class="text-blue-600 mr-2" onclick="editProduct(${product.id})"><i class="fas fa-edit"></i> ${t('edit')}</button>
                                <button class="text-red-600" onclick="deleteProduct(${product.id})"><i class="fas fa-trash"></i> ${t('delete')}</button>
                            ` : ''}
                        </div>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }

        function addProduct() {
            openProductModal('add');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                openProductModal('edit', product);
            }
        }

        function openProductModal(mode, product = null) {
            const modalTemplate = document.getElementById('productModalTemplate').content;
            document.body.appendChild(modalTemplate.cloneNode(true));

            const modal = document.getElementById('productModal');
            const title = document.getElementById('modalTitle');
            const saveBtn = document.getElementById('saveProductBtn');

            if (mode === 'add') {
                title.textContent = t('add_product');
            } else {
                title.textContent = t('edit') + ' ' + t('product_name');
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productOem').value = product.oem;
            }
        }

        function saveProduct() {
            const id = document.getElementById('productId').value;
            const name = document.getElementById('productName').value;
            const oem = document.getElementById('productOem').value;
            const image = document.getElementById('productImage').files[0];

            if (!name || !oem) {
                showToast(t('required_field'));
                return;
            }

            const product = {
                id: id || Date.now(),
                name: name,
                oem: oem,
                image: URL.createObjectURL(image)
            };

            if (id) {
                const index = products.findIndex(p => p.id === id);
                products.splice(index, 1, product);
                showToast(t('product_updated'));
            } else {
                products.push(product);
                showToast(t('product_created'));
            }

            localStorage.setItem('products', JSON.stringify(products));
            renderProductGrid();
            closeModal();
        }

        function deleteProduct(id) {
            if (confirm(t('confirm_delete'))) {
                const index = products.findIndex(p => p.id === id);
                if (index !== -1) {
                    products.splice(index, 1);
                    localStorage.setItem('products', JSON.stringify(products));
                    renderProductGrid();
                    showToast(t('product_deleted'));
                }
            }
        }

        function closeModal() {
            const modal = document.getElementById('productModal');
            if (modal) {
                modal.remove();
            }
        }

        // 同城服务相关功能
        function renderLocalPosts() {
            const localPostsDiv = document.getElementById('localPosts');
            localPostsDiv.innerHTML = '';

            localPosts.forEach(post => {
                const postDiv = document.createElement('div');
                postDiv.className = 'bg-white p-4 rounded shadow';
                postDiv.innerHTML = `
                    <h3 class="font-bold">${post.title}</h3>
                    <p class="text-sm">${post.content}</p>
                    <p class="text-xs text-gray-500">${post.user} - ${t(post.status)}</p>
                    ${hasPermission('local') ? `
                        <div class="flex gap-2 mt-2">
                            <button class="bg-green-100 text-green-600 px-2 py-1 rounded" onclick="approvePost(${post.id})">${t('pass')}</button>
                            <button class="bg-red-100 text-red-600 px-2 py-1 rounded" onclick="rejectPost(${post.id})">${t('reject')}</button>
                        </div>
                    ` : ''}
                `;
                localPostsDiv.appendChild(postDiv);
            });
        }

        document.getElementById('publishLocalBtn').addEventListener('click', function() {
            if (!currentUser) {
                showToast(t('unauthorized'));
                return;
            }

            const title = document.getElementById('localTitle').value;
            const content = document.getElementById('localContent').value;

            if (!title || !content) {
                showToast(t('required_field'));
                return;
            }

            const post = {
                id: Date.now(),
                title: title,
                content: content,
                user: currentUser.username,
                status: 'pending'
            };

            localPosts.push(post);
            localStorage.setItem('localPosts', JSON.stringify(localPosts));
            document.getElementById('localTitle').value = '';
            document.getElementById('localContent').value = '';
            showToast(t('post_published'));
            renderLocalPosts();
        });

        function approvePost(id) {
            const post = localPosts.find(p => p.id === id);
            if (post) {
                post.status = 'approved';
                localStorage.setItem('localPosts', JSON.stringify(localPosts));
                renderLocalPosts();
                showToast(t('post_approved'));
            }
        }

        function rejectPost(id) {
            if (confirm(t('confirm_reject'))) {
                const post = localPosts.find(p => p.id === id);
                if (post) {
                    post.status = 'rejected';
                    localStorage.setItem('localPosts', JSON.stringify(localPosts));
                    renderLocalPosts();
                    showToast(t('post_rejected'));
                }
            }
        }

        // 个人中心相关功能
        function renderAccountPage() {
            if (!currentUser) {
                showToast(t('unauthorized'));
                switchView('home');
                return;
            }

            const usernameValue = document.getElementById('accountUsernameValue');
            const roleValue = document.getElementById('accountRoleValue');
            const registerTime = document.getElementById('accountRegisterTime');

            usernameValue.textContent = currentUser.username;
            roleValue.textContent = currentUser.role;
            registerTime.textContent = new Date().toLocaleString();
        }

        function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (oldPassword !== currentUser.password) {
                showToast(t('wrong_password'));
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast(t('password_not_match'));
                return;
            }

            currentUser.password = newPassword;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            showToast(t('change_success'));
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        // 管理后台相关功能
        function renderAdminTabs() {
            const adminTabs = document.querySelectorAll('.admin-tab');
            const adminPanels = document.querySelectorAll('[id^="admin"][Panel]');

            adminTabs.forEach(tab => {
                const permission = tab.dataset.adminTab;
                if (hasPermission(permission)) {
                    tab.style.display = 'block';
                    tab.addEventListener('click', function() {
                        adminTabs.forEach(t => t.classList.remove('active-tab'));
                        this.classList.add('active-tab');
                        adminPanels.forEach(p => p.classList.add('hidden'));
                        document.getElementById(`admin${permission.charAt(0).toUpperCase() + permission.slice(1)}Panel`).classList.remove('hidden');
                        renderAdminContent(permission);
                    });
                } else {
                    tab.style.display = 'none';
                }
            });

            if (hasPermission('products')) {
                document.getElementById('adminProductsPanel').classList.remove('hidden');
                renderAdminContent('products');
            }
        }

        function renderAdminContent(tab) {
            const panel = document.getElementById(`admin${tab.charAt(0).toUpperCase() + tab.slice(1)}Panel`);
            panel.innerHTML = '';

            switch (tab) {
                case 'products':
                    const productsTable = document.createElement('div');
                    productsTable.className = 'table-responsive';
                    productsTable.innerHTML = `
                        <h3 class="font-bold text-lg mb-3">${t('product_mgt')}</h3>
                        <table class="w-full table-auto">
                            <thead>
                                <tr>
                                    <th class="px-4 py-2">${t('product_name')}</th>
                                    <th class="px-4 py-2">${t('oem_code')}</th>
                                    <th class="px-4 py-2">${t('image')}</th>
                                    <th class="px-4 py-2">${t('action')}</th>
                                </tr>
                            </thead>
                            <tbody id="adminProductsTable"></tbody>
                        </table>
                        <button class="mt-4 px-4 py-2 bg-blue-600 text-white rounded" onclick="addProduct()">${t('add_product')}</button>
                    `;
                    panel.appendChild(productsTable);

                    const productsBody = document.getElementById('adminProductsTable');
                    products.forEach(product => {
                        productsBody.innerHTML += `
                            <tr>
                                <td class="px-4 py-2">${product.name}</td>
                                <td class="px-4 py-2">${product.oem}</td>
                                <td class="px-4 py-2"><img src="${product.image}" class="w-24"></td>
                                <td class="px-4 py-2">
                                    <button class="text-blue-600 mr-2" onclick="editProduct(${product.id})"><i class="fas fa-edit"></i> ${t('edit')}</button>
                                    <button class="text-red-600" onclick="deleteProduct(${product.id})"><i class="fas fa-trash"></i> ${t('delete')}</button>
                                </td>
                            </tr>
                        `;
                    });
                    break;

                case 'local':
                    const localTable = document.createElement('div');
                    localTable.className = 'table-responsive';
                    localTable.innerHTML = `
                        <h3 class="font-bold text-lg mb-3">${t('local_mgt')}</h3>
                        <table class="w-full table-auto">
                            <thead>
                                <tr>
                                    <th class="px-4 py-2">${t('title')}</th>
                                    <th class="px-4 py-2">${t('user')}</th>
                                    <th class="px-4 py-2">${t('status')}</th>
                                    <th class="px-4 py-2">${t('action')}</th>
                                </tr>
                            </thead>
                            <tbody id="adminLocalTable"></tbody>
                        </table>
                    `;
                    panel.appendChild(localTable);

                    const localBody = document.getElementById('adminLocalTable');
                    localPosts.forEach(post => {
                        localBody.innerHTML += `
                            <tr>
                                <td class="px-4 py-2">${post.title}</td>
                                <td class="px-4 py-2">${post.user}</td>
                                <td class="px-4 py-2">
                                    <span class="status-badge ${post.status === 'pending' ? 'status-pending' : post.status === 'approved' ? 'status-approved' : 'status-rejected'}">
                                        ${t(post.status)}
                                    </span>
                                </td>
                                <td class="px-4 py-2">
                                    <button class="bg-green-100 text-green-600 px-2 py-1 rounded" onclick="approvePost(${post.id})">${t('pass')}</button>
                                    <button class="bg-red-100 text-red-600 px-2 py-1 rounded" onclick="rejectPost(${post.id})">${t('reject')}</button>
                                </td>
                            </tr>
                        `;
                    });
                    break;

                case 'users':
                    const usersTable = document.createElement('div');
                    usersTable.className = 'table-responsive';
                    usersTable.innerHTML = `
                        <h3 class="font-bold text-lg mb-3">${t('user_mgt')}</h3>
                        <table class="w-full table-auto">
                            <thead>
                                <tr>
                                    <th class="px-4 py-2">${t('username')}</th>
                                    <th class="px-4 py-2">${t('role')}</th>
                                    <th class="px-4 py-2">${t('action')}</th>
                                </tr>
                            </thead>
                            <tbody id="adminUsersTable"></tbody>
                        </table>
                        <button class="mt-4 px-4 py-2 bg-blue-600 text-white rounded" onclick="addUser()">${t('add_user')}</button>
                    `;
                    panel.appendChild(usersTable);

                    const usersBody = document.getElementById('adminUsersTable');
                    users.forEach(user => {
                        usersBody.innerHTML += `
                            <tr>
                                <td class="px-4 py-2">${user.username}</td>
                                <td class="px-4 py-2">${user.role}</td>
                                <td class="px-4 py-2">
                                    <button class="text-blue-600 mr-2" onclick="editUser(${user.id})"><i class="fas fa-edit"></i> ${t('edit')}</button>
                                    <button class="text-red-600" onclick="deleteUser(${user.id})"><i class="fas fa-trash"></i> ${t('delete')}</button>
                                </td>
                            </tr>
                        `;
                    });
                    break;
            }
        }

        function addUser() {
            openUserModal('add');
        }

        function editUser(id) {
            const user = users.find(u => u.id === id);
            if (user) {
                openUserModal('edit', user);
            }
        }

        function openUserModal(mode, user = null) {
            const modalTemplate = document.getElementById('userModalTemplate').content;
            document.body.appendChild(modalTemplate.cloneNode(true));

            const modal = document.getElementById('userModal');
            const title = document.getElementById('userModalTitle');

            if (mode === 'add') {
                title.textContent = t('add_user');
            } else {
                title.textContent = t('edit') + ' ' + t('user');
                document.getElementById('userId').value = user.id;
                document.getElementById('userName').value = user.username;
                document.getElementById('userPassword').value = user.password;
                document.getElementById('userRole').value = user.role;
            }
        }

        function saveUser() {
            const id = document.getElementById('userId').value;
            const name = document.getElementById('userName').value;
            const password = document.getElementById('userPassword').value;
            const role = document.getElementById('userRole').value;

            if (!name || !password) {
                showToast(t('required_field'));
                return;
            }

            const user = {
                id: id || Date.now(),
                username: name,
                password: password,
                role: role,
                permissions: getPermissionsByRole(role)
            };

            if (id) {
                const index = users.findIndex(u => u.id === id);
                users.splice(index, 1, user);
                showToast(t('user_updated'));
            } else {
                users.push(user);
                showToast(t('user_created'));
            }

            localStorage.setItem('app_users', JSON.stringify(users));
            renderAdminContent('users');
            closeUserModal();
        }

        function getPermissionsByRole(role) {
            switch (role) {
                case 'super_admin':
                    return ['products', 'local', 'users'];
                case 'editor':
                    return ['products'];
                case 'user':
                    return [];
                default:
                    return [];
            }
        }

        function deleteUser(id) {
            if (confirm(`确认删除用户？`)) {
                const index = users.findIndex(u => u.id === id);
                if (index !== -1) {
                    users.splice(index, 1);
                    localStorage.setItem('app_users', JSON.stringify(users));
                    renderAdminContent('users');
                    showToast(t('user_deleted'));
                }
            }
        }

        function closeUserModal() {
            const modal = document.getElementById('userModal');
            if (modal) {
                modal.remove();
            }
        }

        // 聊天功能
        document.getElementById('openChatBtn').addEventListener('click', function() {
            document.getElementById('chatBox').classList.remove('hidden');
        });

        document.getElementById('closeChatBtn').addEventListener('click', function() {
            document.getElementById('chatBox').classList.add('hidden');
        });

        document.getElementById('sendChatBtn').addEventListener('click', function() {
            const message = document.getElementById('chatInput').value.trim();
            if (message) {
                const messages = document.getElementById('chatMessages');
                messages.innerHTML += `
                    <div class="flex justify-end mb-2">
                        <div class="bg-blue-600 text-white p-2 rounded-lg max-w-[80%]">
                            ${message}
                        </div>
                    </div>
                `;
                document.getElementById('chatInput').value = '';
                // 模拟客服回复
                setTimeout(() => {
                    messages.innerHTML += `
                        <div class="flex justify-start mb-2">
                            <div class="bg-gray-200 p-2 rounded-lg max-w-[80%]">
                                ${t('chat_response')}
                            </div>
                        </div>
                    `;
                    messages.scrollTop = messages.scrollHeight;
                }, 1000);
            }
        });

        // 初始化应用
        init();

        // 页面加载时自动登录测试用户
        // login();
    </script>
</body>
</html>
